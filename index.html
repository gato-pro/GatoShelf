
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gato Shelf is a personal collection of projects, tools, experiments, and creative work by Gato.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Gato Shelf - Projects and Creative Work</title>


  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <span></span>
      <h1>Gato Shelf</h1>
    </div>

    <div class="nav-right">
      <input type="text" id="searchInput" placeholder="Search projects...">

      <select id="sortSelect">
        <option value="new">Newest</option>
        <option value="old">Oldest</option>
        <option value="az">A-Z</option>
      </select>

      <button id="uploadBtn">Upload</button>
    </div>
  </nav>

  <header class="hero">
    <h2>Explore All My Projects In One Place.</h2>
    <p>
      A collection of my small projects, tools, and experiments.
    </p>
  </header>

  <section class="feed-section">
    <div class="section-title">
      <h3>Recent Uploads</h3>
    </div>

    <div id="projectsGrid" class="projects-grid"></div>
  </section>


<script type="module" src="app.js"></script>

</body>
</html>
